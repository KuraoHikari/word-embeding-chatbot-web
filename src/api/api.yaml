                required:
                  - id
                  - title
                  - description
                  - isPublic
                  - welcomeMessage
                  - suggestionMessage
                  - systemPrompt
                  - aiModel
                  - isProposedModel
                  - embeddingModel
                  - temperature
                  - maxTokens
                  - pdfTitle
                  - pdfLink
                  - userId
                  - createdAt
                  - updatedAt
        "400":
