                  title:
                    type: string
                  description:
                    type: string
                    nullable: true
                  isPublic:
                    type: boolean
                  welcomeMessage:
                    type: string
                  suggestionMessage:
                    type: string
                  systemPrompt:
                    type: string
                  aiModel:
                    type: string
                  isProposedModel:
                    type: boolean
                  embeddingModel:
                    type: string
                  temperature:
                    type: number
                  maxTokens:
                    type: number
                  pdfTitle:
                    type: string
                  pdfLink:
                    type: string
                  userId:
                    type: number
                  createdAt:
                    type: string
                    nullable: true
                  updatedAt:
                    type: string
                    nullable: true
                  totalMessages:
                    type: number
