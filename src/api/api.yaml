openapi: 3.0.0
info:
  version: 1.0.0
  title: Word Embedding Chatbot API
components:
  schemas: {}
  parameters: {}
paths:
  /:
    get:
      tags:
        - Index
      responses:
        "200":
          description: Welcome to the Word Embedding Chatbot API! Index
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
                example:
                  message: Welcome to the Word Embedding Chatbot API!
  /tasks:
    get:
      tags:
        - Tasks
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: number
                    name:
                      type: string
                    done:
                      type: boolean
                    createdAt:
                      type: string
                      nullable: true
                    updatedAt:
                      type: string
                      nullable: true
                  required:
                    - id
                    - name
                    - done
                    - createdAt
                    - updatedAt
    post:
      tags:
        - Tasks
      requestBody:
        description: The task to create
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 500
                done:
                  type: boolean
              required:
                - name
                - done
      responses:
        "200":
          description: The Create task
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: number
                  name:
                    type: string
                  done:
                    type: boolean
                  createdAt:
                    type: string
                    nullable: true
                  updatedAt:
                    type: string
                    nullable: true
                required:
                  - id
                  - name
                  - done
                  - createdAt
                  - updatedAt
        "422":
          description: The validation error(s)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      issues:
                        type: array
                        items:
                          type: object
                          properties:
                            code:
                              type: string
                            path:
                              type: array
                              items:
                                anyOf:
                                  - type: string
                                  - type: number
                            message:
                              type: string
                          required:
                            - code
                            - path
                      name:
                        type: string
                    required:
                      - issues
                      - name
                    example:
                      issues:
                        - code: invalid_type
                          expected: string
                          received: undefined
                          path:
                            - name
                          message: Required
                        - code: invalid_type
                          expected: boolean
                          received: undefined
                          path:
                            - done
                          message: Required
                      name: ZodError
                required:
                  - success
                  - error
  /tasks/{id}:
    get:
      security:
        - AuthorizationBearer: []
      tags:
        - Tasks
      parameters:
        - schema:
            type: number
            nullable: true
            required:
              - id
            example: 42
          required: true
          name: id
          in: path
        - schema:
            type: string
          required: false
          name: authorization
          in: header
      responses:
        "200":
          description: The required tasks
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: number
                  name:
                    type: string
                  done:
                    type: boolean
                  createdAt:
                    type: string
                    nullable: true
                  updatedAt:
                    type: string
                    nullable: true
                required:
                  - id
                  - name
                  - done
                  - createdAt
                  - updatedAt
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
                example:
                  message: Not Found
        "422":
          description: Invalid id error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      issues:
                        type: array
                        items:
                          type: object
                          properties:
                            code:
                              type: string
                            path:
                              type: array
                              items:
                                anyOf:
                                  - type: string
                                  - type: number
                            message:
                              type: string
                          required:
                            - code
                            - path
                      name:
                        type: string
                    required:
                      - issues
                      - name
                    example:
                      issues:
                        - code: invalid_type
                          expected: number
                          received: nan
                          path:
                            - id
                          message: Expected number, received nan
                      name: ZodError
                required:
                  - success
                  - error
    patch:
      tags:
        - Tasks
      parameters:
        - schema:
            type: number
            nullable: true
            required:
              - id
            example: 42
          required: true
          name: id
          in: path
      requestBody:
        description: The task updates
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 500
                done:
                  type: boolean
      responses:
        "200":
          description: The updated task
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: number
                  name:
                    type: string
                  done:
                    type: boolean
                  createdAt:
                    type: string
                    nullable: true
                  updatedAt:
                    type: string
                    nullable: true
                required:
                  - id
                  - name
                  - done
                  - createdAt
                  - updatedAt
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
                example:
                  message: Not Found
        "422":
          description: The validation error(s)
          content:
            application/json:
              schema:
                anyOf:
                  - type: object
                    properties:
                      success:
                        type: boolean
                        example: false
                      error:
                        type: object
                        properties:
                          issues:
                            type: array
                            items:
                              type: object
                              properties:
                                code:
                                  type: string
                                path:
                                  type: array
                                  items:
                                    anyOf:
                                      - type: string
                                      - type: number
                                message:
                                  type: string
                              required:
                                - code
                                - path
                          name:
                            type: string
                        required:
                          - issues
                          - name
                    required:
                      - success
                      - error
                  - type: object
                    properties:
                      success:
                        type: boolean
                        example: false
                      error:
                        type: object
                        properties:
                          issues:
                            type: array
                            items:
                              type: object
                              properties:
                                code:
                                  type: string
                                path:
                                  type: array
                                  items:
                                    anyOf:
                                      - type: string
                                      - type: number
                                message:
                                  type: string
                              required:
                                - code
                                - path
                          name:
                            type: string
                        required:
                          - issues
                          - name
                        example:
                          issues:
                            - code: invalid_type
                              expected: number
                              received: nan
                              path:
                                - id
                              message: Expected number, received nan
                          name: ZodError
                    required:
                      - success
                      - error
    delete:
      tags:
        - Tasks
      parameters:
        - schema:
            type: number
            nullable: true
            required:
              - id
            example: 42
          required: true
          name: id
          in: path
      responses:
        "204":
          description: Task deleted
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
                example:
                  message: Not Found
        "422":
          description: Invalid id error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      issues:
                        type: array
                        items:
                          type: object
                          properties:
                            code:
                              type: string
                            path:
                              type: array
                              items:
                                anyOf:
                                  - type: string
                                  - type: number
                            message:
                              type: string
                          required:
                            - code
                            - path
                      name:
                        type: string
                    required:
                      - issues
                      - name
                    example:
                      issues:
                        - code: invalid_type
                          expected: number
                          received: nan
                          path:
                            - id
                          message: Expected number, received nan
                      name: ZodError
                required:
                  - success
                  - error
  /auth/login:
    post:
      tags:
        - Auth
      requestBody:
        description: The user to login
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                  minLength: 8
                  maxLength: 500
                email:
                  type: string
                  minLength: 1
                  maxLength: 500
                  format: email
              required:
                - password
                - email
      responses:
        "200":
          description: The login response
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: number
                      email:
                        type: string
                      name:
                        type: string
                    required:
                      - id
                      - email
                      - name
                  access_token:
                    type: string
                required:
                  - user
                  - access_token
        "401":
          description: The invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
                example:
                  message: Unauthorized
        "422":
          description: The validation error(s)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      issues:
                        type: array
                        items:
                          type: object
                          properties:
                            code:
                              type: string
                            path:
                              type: array
                              items:
                                anyOf:
                                  - type: string
                                  - type: number
                            message:
                              type: string
                          required:
                            - code
                            - path
                      name:
                        type: string
                    required:
                      - issues
                      - name
                    example:
                      issues:
                        - code: invalid_type
                          expected: string
                          received: undefined
                          path:
                            - name
                          message: Required
                        - code: invalid_type
                          expected: string
                          received: undefined
                          path:
                            - password
                          message: Required
                        - code: invalid_type
                          expected: string
                          received: undefined
                          path:
                            - email
                          message: Required
                      name: ZodError
                required:
                  - success
                  - error
  /auth/register:
    post:
      tags:
        - Auth
      requestBody:
        description: The user to register
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 500
                password:
                  type: string
                  minLength: 8
                  maxLength: 500
                email:
                  type: string
                  minLength: 1
                  maxLength: 500
                  format: email
              required:
                - name
                - password
                - email
      responses:
        "201":
          description: The registration response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
