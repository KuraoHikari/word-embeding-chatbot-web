                          message: Required
                        - code: invalid_type
                          expected: string
                          received: undefined
                          path:
                            - password
                          message: Required
                        - code: invalid_type
                          expected: string
                          received: undefined
                          path:
                            - email
                          message: Required
                      name: ZodError
                required:
                  - success
                  - error
  /auth/me:
    get:
      tags:
        - Auth
      parameters:
        - schema:
            type: string
          required: false
          name: authorization
          in: header
      responses:
        "200":
          description: The user
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: number
                  email:
                    type: string
                  name:
                    type: string
                required:
                  - id
                  - email
                  - name
        "401":
          description: The invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
                example:
                  message: Unauthorized
        "429":
          description: The rate limit errors
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
                example:
                  message: Too Many Requests
  /chatbots:
    get:
      tags:
        - Chatbots
      parameters:
        - schema:
            type: string
          required: false
          name: authorization
          in: header
      responses:
        "200":
          description: List of chatbots
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: number
                    title:
                      type: string
                    description:
                      type: string
                      nullable: true
                    isPublic:
                      type: boolean
                    welcomeMessage:
                      type: string
                    suggestionMessage:
                      type: string
                    systemPrompt:
                      type: string
                    aiModel:
                      type: string
                    isProposedModel:
                      type: boolean
                    embeddingModel:
                      type: string
                    temperature:
                      type: number
                    maxTokens:
                      type: number
                    pdfTitle:
                      type: string
                    pdfLink:
                      type: string
                    userId:
                      type: number
                    createdAt:
                      type: string
                      nullable: true
                    updatedAt:
                      type: string
                      nullable: true
                  required:
                    - id
                    - title
                    - description
                    - isPublic
                    - welcomeMessage
                    - suggestionMessage
                    - systemPrompt
                    - aiModel
                    - isProposedModel
                    - embeddingModel
                    - temperature
                    - maxTokens
                    - pdfTitle
                    - pdfLink
                    - userId
                    - createdAt
                    - updatedAt
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
    post:
      tags:
        - Chatbots
      parameters:
        - schema:
            type: string
          required: false
          name: authorization
          in: header
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 100
                description:
                  type: string
                  nullable: true
                  minLength: 1
                  maxLength: 500
                isPublic:
                  type: boolean
                welcomeMessage:
                  type: string
                  minLength: 1
                  maxLength: 1000
                suggestionMessage:
                  type: string
                  minLength: 1
                  maxLength: 1000
                systemPrompt:
                  type: string
                  minLength: 1
                  maxLength: 2000
                aiModel:
                  type: string
                isProposedModel:
                  type: boolean
                embeddingModel:
                  type: string
                temperature:
                  type: number
                  minimum: 0
                  maximum: 1
                  default: 0.3
                maxTokens:
                  type: integer
                  minimum: 100
                  maximum: 2000
                  default: 500
                pdf:
                  anyOf:
                    - {}
                    - {}
                  description: PDF file upload
                  format: binary
              required:
                - title
                - description
                - isPublic
                - welcomeMessage
                - suggestionMessage
                - aiModel
                - isProposedModel
                - embeddingModel
      responses:
        "201":
          description: Chatbot created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
        "413":
          description: File size exceeds limit
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
        "429":
          description: Too Many Requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
  /chatbots/{id}:
    get:
      tags:
        - Chatbots
      parameters:
        - schema:
            type: number
            nullable: true
            required:
              - id
            example: 42
